name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  desktop-v2:
    name: Build and quality gates
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run safe quality checks
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File desktop_v2\tools\CiQualityChecks.ps1 -Root .
